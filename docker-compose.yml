services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: recto
      POSTGRES_USER: recto
      POSTGRES_PASSWORD: ${DB_PASSWORD:-recto}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recto"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://recto:${DB_PASSWORD:-recto}@db:5432/recto
      RECTO_ISSUER_URL: ${RECTO_ISSUER_URL:-http://localhost}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    environment:
      RECTO_API_URL: http://api:3000
      RECTO_API_KEY: ${RECTO_API_KEY}
      MCP_TRANSPORT: http
      MCP_PORT: "3001"
    ports:
      - "${MCP_PORT:-3001}:3001"
    depends_on:
      - api

  proxy:
    image: caddy:2-alpine
    ports:
      - "${RECTO_PORT:-80}:80"
      - "${RECTO_TLS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - api
      - mcp
    environment:
      - RECTO_DOMAIN=${RECTO_DOMAIN:-localhost}

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api

volumes:
  postgres_data:
  caddy_data:
