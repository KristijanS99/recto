services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: recto
      POSTGRES_USER: recto
      POSTGRES_PASSWORD: ${DB_PASSWORD:-recto}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recto"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
