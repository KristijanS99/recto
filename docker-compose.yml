services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: recto
      POSTGRES_USER: recto
      POSTGRES_PASSWORD: ${DB_PASSWORD:-recto}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recto"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://recto:${DB_PASSWORD:-recto}@db:5432/recto
      RECTO_ISSUER_URL: https://${RECTO_DOMAIN:-localhost}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    environment:
      RECTO_API_URL: http://api:3000
      RECTO_API_KEY: ${RECTO_API_KEY}
      MCP_PORT: "3001"
    ports:
      - "${MCP_PORT:-3001}:3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        VITE_RECTO_API_KEY: ${VITE_RECTO_API_KEY}
    volumes:
      - web_dist:/srv

  proxy:
    image: caddy:2-alpine
    ports:
      - "${RECTO_PORT:-80}:80"
      - "${RECTO_TLS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - web_dist:/srv/web:ro
    depends_on:
      web:
        condition: service_completed_successfully
      api:
        condition: service_started
      mcp:
        condition: service_started
    environment:
      - RECTO_DOMAIN=${RECTO_DOMAIN:-localhost}
      - CADDY_GLOBAL_OPTIONS=${CADDY_GLOBAL_OPTIONS:-}
      - RECTO_WEB_USER=${RECTO_WEB_USER:-admin}
      - RECTO_WEB_PASSWORD_HASH=${RECTO_WEB_PASSWORD_HASH}

volumes:
  postgres_data:
  caddy_data:
  web_dist:
