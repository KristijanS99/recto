# Use pre-built images from GitHub Container Registry.
# Usage: docker compose -f docker-compose.ghcr.yml up -d

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: recto
      POSTGRES_USER: recto
      POSTGRES_PASSWORD: ${DB_PASSWORD:-recto}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recto"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/kristijans99/recto-api:latest
    env_file: .env
    environment:
      DATABASE_URL: postgresql://recto:${DB_PASSWORD:-recto}@db:5432/recto
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  mcp:
    image: ghcr.io/kristijans99/recto-mcp:latest
    environment:
      RECTO_API_URL: http://api:3000
      RECTO_API_KEY: ${RECTO_API_KEY}
      MCP_PORT: "3001"
    ports:
      - "${MCP_PORT:-3001}:3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3

  web:
    image: ghcr.io/kristijans99/recto-web:latest
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api

volumes:
  postgres_data:
